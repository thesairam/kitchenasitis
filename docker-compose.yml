services:

  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

  app:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
