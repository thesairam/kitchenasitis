services:

  # ── Development (Vite HMR, no server needed) ──────────────────────────────
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

  # ── Production (Node serves API + built frontend) ─────────────────────────
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    restart: unless-stopped
