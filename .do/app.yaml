name: kitchenasitis
region: ams
services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: FROM_NAME
        value: Kitchen As It Is - Website
      # Set these three as SECRETS in the App Platform dashboard — do NOT put values here.
      - key: SMTP_USER
        scope: RUN_TIME
        type: SECRET
      - key: SMTP_PASS
        scope: RUN_TIME
        type: SECRET
      - key: TO_EMAIL
        scope: RUN_TIME
        type: SECRET
